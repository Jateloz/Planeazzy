<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 72" fill="none">
  <!-- Blue rounded rectangle background for P+ mark -->
  <rect x="0" y="4" width="64" height="64" rx="16" fill="#1978e5"/>
  <!-- Cross / plus mark inside (health + symbol) -->
  <rect x="28" y="16" width="8" height="40" rx="4" fill="white"/>
  <rect x="12" y="28" width="40" height="8" rx="4" fill="white"/>
  <!-- Small teal accent dot -->
  <circle cx="52" cy="16" r="5" fill="#0d9488"/>
  <!-- Wordmark: "laneazzy" in Inter-style bold -->
  <text x="80" y="50" font-family="'Inter','Plus Jakarta Sans',Arial,sans-serif"
        font-size="36" font-weight="800" letter-spacing="-1.2"
        fill="#1978e5">laneazzy</text>
</svg>
